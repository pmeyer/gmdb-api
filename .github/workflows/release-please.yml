name: Release Please

on:
  push:
    branches:
      - main

permissions:
  contents: write
  issues: write
  pull-requests: write
  packages: write

jobs:
  release-please:
    name: Release and publish
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Release Please
        id: release
        uses: googleapis/release-please-action@v5
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

      - name: Checkout release
        if: ${{ steps.release.outputs.release_created == 'true' }}
        uses: actions/checkout@v6.0.2
        with:
          ref: ${{ steps.release.outputs.tag_name }}

      - name: Set up Java
        if: ${{ steps.release.outputs.release_created == 'true' }}
        uses: actions/setup-java@v5.2.0
        with:
          distribution: temurin
          java-version: '23'
          cache: maven
          server-id: github

      - name: Verify release version
        id: version
        if: ${{ steps.release.outputs.release_created == 'true' }}
        run: |
          VERSION="$(mvn -q -DforceStdout help:evaluate -Dexpression=project.version)"
          if [[ "$VERSION" == *-SNAPSHOT ]]; then
            echo "Refusing to publish snapshot version $VERSION"
            exit 1
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Configure Maven package credentials
        if: ${{ steps.release.outputs.release_created == 'true' }}
        run: |
          mkdir -p ~/.m2
          cat > ~/.m2/settings.xml <<'EOF'
          <settings xmlns="http://maven.apache.org/SETTINGS/1.2.0"
                    xmlns:xsi="http://www.w3.org/2001/XMLSchema-instance"
                    xsi:schemaLocation="http://maven.apache.org/SETTINGS/1.2.0 https://maven.apache.org/xsd/settings-1.2.0.xsd">
            <servers>
              <server>
                <id>github</id>
                <username>${env.GITHUB_ACTOR}</username>
                <password>${env.GITHUB_TOKEN}</password>
              </server>
              <server>
                <id>github-gmdb-liquibase</id>
                <username>${env.GITHUB_ACTOR}</username>
                <password>${env.GITHUB_TOKEN}</password>
              </server>
            </servers>
          </settings>
          EOF

      - name: Publish package
        if: ${{ steps.release.outputs.release_created == 'true' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: mvn -B -Dmaven.test.skip=true deploy

      - name: Set up Docker Buildx
        if: ${{ steps.release.outputs.release_created == 'true' }}
        uses: docker/setup-buildx-action@v4.1.0

      - name: Log in to GitHub Container Registry
        if: ${{ steps.release.outputs.release_created == 'true' }}
        uses: docker/login-action@v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and publish container image
        if: ${{ steps.release.outputs.release_created == 'true' }}
        uses: docker/build-push-action@v7.2.0
        with:
          context: .
          build-args: |
            JAR_FILE=target/gmdb-api-${{ steps.version.outputs.version }}.jar
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:${{ steps.version.outputs.version }}
            ghcr.io/${{ github.repository }}:latest
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.version=${{ steps.version.outputs.version }}
