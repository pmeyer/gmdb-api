name: CI

on:
  push:
    branches:
      - main
      - codex/**
      - feature/**
      - bugfix/**
  pull_request:
    branches:
      - main
      - codex/**
      - feature/**
      - bugfix/**

permissions:
  contents: read
  packages: read

jobs:
  build-test:
    name: Build and test
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '23'
          cache: maven
          server-id: github-gmdb-liquibase

      - name: Build and test
        env:
          GITHUB_TOKEN: ${{ secrets.MAVEN_PACKAGE_READ }}
        run: mvn -B verify
